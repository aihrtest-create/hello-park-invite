name: Deploy to TimeWeb VDS

on:
  push:
    branches:
      - main # Укажите здесь вашу главную ветку (возможно, master)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Copy files via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        source: "."
        target: "~/apps/hello-park-invite"

    - name: Deploy and Build via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          # 1. Установка Docker (если его еще нет на сервере)
          if ! command -v docker &> /dev/null; then
            echo "Установка Docker..."
            curl -fsSL https://get.docker.com -o get-docker.sh
            sh get-docker.sh
          fi
          
          # Установка Docker Compose
          if ! command -v docker-compose &> /dev/null; then
            echo "Установка Docker Compose..."
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi

          # 2. Переход в папку проекта и запуск
          cd ~/apps/hello-park-invite
          echo "Сборка и запуск проекта..."
          docker-compose up -d --build
