version: '3.8'

services:
  invite-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3005:3000" # Mapping host port 3005 to container port 3000
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_data:
